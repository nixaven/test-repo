<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Landing Page</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eef2ff, #dbeafe);
      color: #0f172a;
    }

    main {
      width: min(90vw, 640px);
      padding: 2.5rem;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
      text-align: center;
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
    }

    label {
      display: block;
      margin-bottom: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 0.95rem 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    .display-name {
      margin-top: 2rem;
      min-height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 7vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .placeholder {
      color: #64748b;
      font-weight: 600;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Welcome</h1>
    <label for="nameInput">Type your name</label>
    <input id="nameInput" type="text" placeholder="Enter your name" autocomplete="off">
    <div id="nameDisplay" class="display-name">
      <span class="placeholder">Your name will appear here</span>
    </div>
  </main>

  <script>
    const nameInput = document.getElementById("nameInput");
    const nameDisplay = document.getElementById("nameDisplay");

    nameInput.addEventListener("input", () => {
      const value = nameInput.value.trim();

      if (value) {
        nameDisplay.textContent = value;
      } else {
        nameDisplay.innerHTML = '<span class="placeholder">Your name will appear here</span>';
      }
    });
  </script>
</body>
</html>
